name: Restrict Issue Comments
on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  enforce-privacy:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Unauthorized Comments
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const restrictedLabels = ['data-submission', 'removal-request'];
            const hasRestrictedLabel = issue.labels.some(label => restrictedLabels.includes(label.name));
            
            if (!hasRestrictedLabel) return;
            if (comment.user.login === issue.user.login) return;

            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: comment.user.login,
              });
              
              const isMaintainer = ['admin', 'write'].includes(permission.permission);
              if (isMaintainer) return;
              
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            } catch (error) {}
